<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thạch Anh Ho - Social Network</title>
    <style>
        body { margin: 0; font-family: -apple-system, sans-serif; background: #f0f2f5; overflow: hidden; }
        .hidden { display: none !important; }
        /* Màn hình login */
        #login-page { height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #f0f2f5 0%, #c3cfe2 100%); position: fixed; width: 100%; z-index: 9999; }
        .login-card { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); text-align: center; width: 350px; }
        .btn-login { width: 100%; background: #0866ff; color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; background: #f5f6f7; }
    </style>
</head>
<body>
    <div id="login-page">
        <div class="login-card">
            <h1 style="color: #0866ff; margin-bottom: 5px;">Thạch Anh Ho</h1>
            <p style="color: #65676b; margin-bottom: 25px;">Chào mừng bạn quay trở lại!</p>
            <input type="text" id="user" placeholder="Tên đăng nhập">
            <input type="password" id="pass" placeholder="Mật khẩu">
            <button class="btn-login" onclick="startApp()">ĐĂNG NHẬP</button>
        </div>
    </div>
    <div id="app-content" class="hidden" style="padding-top: 60px; overflow-y: auto; height: 100vh;">
        <div style="background: #0866ff; color: white; padding: 15px; position: fixed; top: 0; width: 100%; z-index: 100; font-weight: bold; display: flex; justify-content: space-between;">
            <span>THẠCH ANH HO</span>
            <span onclick="location.reload()" style="cursor:pointer">🚪 Thoát</span>
        </div>

        <div style="max-width: 600px; margin: 0 auto; padding: 10px;">
            <div style="background: white; border-radius: 10px; padding: 15px; margin-bottom: 15px; box-shadow: 0 1px 2px rgba(0,0,0,0.1);">
                <p style="font-weight: bold; margin-top: 0;">Nhóm của bạn</p>
                <div style="display: flex; gap: 10px; overflow-x: auto; padding-bottom: 5px;">
                    <div style="min-width: 100px; text-align: center; border: 1px solid #ddd; border-radius: 8px; padding: 10px; background: #fff9e6;">
                        <span style="font-size: 20px;">💎</span><br><small>Hội Tóc Vàng</small>
                    </div>
                    <div style="min-width: 100px; text-align: center; border: 1px solid #ddd; border-radius: 8px; padding: 10px; background: #e6f2ff;">
                        <span style="font-size: 20px;">🔮</span><br><small>Đá Thô TN</small>
                    </div>
                    <div style="min-width: 100px; text-align: center; border: 1px solid #ddd; border-radius: 8px; padding: 10px; background: #f2e6ff;">
                        <span style="font-size: 20px;">🔥</span><br><small>Phong Thủy</small>
                    </div>
                </div>
            </div>

            <div style="background: white; border-radius: 10px; padding: 15px; margin-bottom: 15px;">
                <div style="display: flex; gap: 10px; align-items: center;">
                    <div style="width: 40px; height: 40px; background: #ccc; border-radius: 50%;"></div>
                    <input type="text" id="postInput" placeholder="Hôm nay năng lượng đá thế nào?" style="margin-bottom: 0; border-radius: 20px;">
                    <button onclick="addPost()" style="background: #0866ff; color: white; border: none; padding: 10px 15px; border-radius: 8px; cursor: pointer;">Đăng</button>
                </div>
            </div>

            <div id="news-feed">
                <div style="background: white; border-radius: 10px; padding: 15px; margin-bottom: 15px;">
                    <div style="font-weight: bold; color: #0866ff;">Lexus Phan</div>
                    <p>Mẫu Thạch Anh Tóc Vàng này vừa về, năng lượng cực mạnh! 💎</p>
                    <div style="height: 150px; background: #eee; border-radius: 8px; display: flex; align-items: center; justify-content: center; color: #999;">[Ảnh Đá Quý]</div>
                </div>
            </div>
        </div>
    </div>
    <script>
        // Hàm xử lý đăng nhập
        function startApp() {
            document.getElementById('login-page').classList.add('hidden');
            document.getElementById('app-content').classList.remove('hidden');
            document.body.style.overflow = 'auto'; // Cho phép cuộn khi vào app
        }

        // Hàm xử lý đăng bài viết mới
        function addPost() {
            const content = document.getElementById('postInput').value;
            if (content.trim() === "") return;

            const feed = document.getElementById('news-feed');
            const newPost = document.createElement('div');
            newPost.style = "background: white; border-radius: 10px; padding: 15px; margin-bottom: 15px; animation: fadeIn 0.5s;";
            newPost.innerHTML = `
                <div style="font-weight: bold; color: #42b72a;">Thành viên mới</div>
                <p>${content}</p>
                <div style="font-size: 12px; color: #65676b;">Vừa xong · 👍 Thích · 💬 Bình luận</div>
            `;
            
            feed.insertBefore(newPost, feed.firstChild);
            document.getElementById('postInput').value = "";
        }
    </script>
    <style> @keyframes fadeIn { from {opacity: 0; transform: translateY(10px);} to {opacity: 1; transform: translateY(0);} } </style>
</body>
</html>
