<style>
:root {
  --red-btn: linear-gradient(180deg, #E31E24, #9B181B);
  --navy-btn: linear-gradient(180deg, #232D4B, #1A1F33);
  --dark-btn: linear-gradient(180deg, #2C2E35, #1E2024);
  --green-btn: linear-gradient(180deg, #1E5052, #123233);
  --gold-btn: linear-gradient(180deg, #F9BD2F, #E1A31E);
}

body {
  margin: 0;
  font-family: 'Montserrat', sans-serif;
  background: #0b0d10;
  color: white;
  display: flex;
  justify-content: center;
  padding: 10px 0;
}

.container {
  max-width: 450px;
  width: 95%;
  text-align: center;
}

.banner {
  width: 100%;
  border-radius: 12px;
  display: block;
  margin-bottom: 15px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.5);
  border: 1px solid rgba(255,255,255,0.1);
  opacity: 0;
  animation: fadeIn 1s forwards;
}

.section-title {
  font-size: 14px;
  color: #aaa;
  text-transform: uppercase;
  margin: 15px 0 5px;
  font-weight: bold;
  letter-spacing: 1px;
  opacity: 0;
  animation: fadeIn 1s forwards;
}

.btn {
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 12px auto 18px;
  padding: 16px;
  font-size: 16px;
  font-weight: 800;
  border-radius: 14px;
  text-decoration: none;
  text-transform: uppercase;
  overflow: hidden;
  position: relative;
  border: 1px solid rgba(255,255,255,0.1);
  box-shadow: 0 10px 20px rgba(0,0,0,0.3);
  transition: all 0.3s ease;
  opacity: 0;
  animation: fadeIn 1s forwards;
}

.btn::after {
  content: "";
  position: absolute;
  top: 0;
  left: -100%;
  width: 50%;
  height: 100%;
  background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.3) 50%, rgba(255,255,255,0) 100%);
  transform: skewX(-25deg);
  transition: 0.5s;
}

.btn:hover::after { left: 125%; }
.btn:active { transform: scale(0.96); }

.btn-live { background: var(--red-btn); animation: pulse 1.5s infinite, fadeIn 1s forwards; color: #fff; }
.btn-comment { background: var(--navy-btn); color: #fff; animation: fadeIn 1s forwards; }
.btn-reg { background: var(--green-btn); color: #fff; animation: fadeIn 1s forwards; }
.btn-code { background: var(--gold-btn); color: #1A1A1A; animation: pulse 2s infinite, fadeIn 1s forwards; }
.btn-support { background: var(--dark-btn); color: #fff; animation: fadeIn 1s forwards; }

.icon { margin-right: 18px; font-size: 32px; }

@keyframes pulse {
  0% { transform: scale(1); }
  50% { transform: scale(1.03); }
  100% { transform: scale(1); }
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px);}
  to { opacity: 1; transform: translateY(0);}
}

/* Stagger animation delay */
.banner:nth-child(1), .section-title:nth-of-type(1), .btn:nth-of-type(1) { animation-delay: 0.2s; }
.banner:nth-child(2), .section-title:nth-of-type(2), .btn:nth-of-type(2) { animation-delay: 0.4s; }
.banner:nth-child(3), .section-title:nth-of-type(3), .btn:nth-of-type(3) { animation-delay: 0.6s; }
.banner:nth-child(4), .section-title:nth-of-type(4), .btn:nth-of-type(4) { animation-delay: 0.8s; }
.banner:nth-child(5), .section-title:nth-of-type(5), .btn:nth-of-type(5) { animation-delay: 1s; }
</style>
